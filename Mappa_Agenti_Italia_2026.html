<style>
  :root{

  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased}
  #app{display:flex;flex-direction:column;height:100vh;min-height:560px}
  header{padding:13px 22px 11px;border-bottom:1px solid var(--line);display:flex;
    align-items:flex-end;justify-content:space-between;gap:18px;flex-wrap:wrap;
    background:linear-gradient(180deg,#f7f4ee,#f1ede4);z-index:500}
  .brand h1{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:23px;margin:0;color:var(--wine-deep)}

  .stat b{font-family:'Fraunces',serif;font-size:21px;font-weight:600;display:block;line-height:1}
  .stat span{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--ink-soft)}
  main{flex:1;display:flex;min-height:0}
  aside{width:300px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#f7f4ee}
  .search{padding:12px 14px 10px;border-bottom:1px solid var(--line)}

    font-size:13px;background:#fff;color:var(--ink);outline:none;font-family:inherit}

  #map{position:absolute;inset:0;background:#a9d6f2}
  .legend{position:absolute;left:12px;bottom:22px;z-index:450;background:rgba(247,244,238,.94);
    border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:11px}
  .legend .row{display:flex;align-items:center;gap:7px;margin:3px 0}
  .legend i{width:11px;height:11px;border-radius:50%;display:inline-block}
  .legend .sec{margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
  .legend .sq{width:13px;height:11px;border-radius:3px;display:inline-block}
  .pin{position:relative;width:22px;height:22px}
  .pin .b{position:absolute;inset:0;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .pin.attivo .b{background:var(--wine)}.pin.presidiare .b{background:var(--ochre)}.pin.vacante .b{background:var(--grey)}
  .reglabel{font-family:'Fraunces',serif;font-size:11px;font-weight:600;color:#2a2620;
    text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 6px #fff;white-space:nowrap;pointer-events:none;text-align:center}

  .leaflet-popup-content{margin:12px 14px;font-family:'Inter',sans-serif;width:262px!important}

  .pop .zone{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .pill{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;
    padding:2px 7px;border-radius:20px;font-weight:600;margin-top:6px}
  .pill.attivo{background:rgba(110,20,35,.10);color:var(--wine)}
  .pill.presidiare{background:rgba(194,135,44,.18);color:#9a6916}
  .pill.vacante{background:#ece9e0;color:#6b675c}
  .pop .ft{font-size:11.5px;color:var(--ink-soft);margin-top:7px}
  .pop .ft b{color:var(--ink);font-variant-numeric:tabular-nums}
  .pop .note{font-size:11px;color:#6a5d4e;background:#faf7f0;border-left:3px solid var(--ochre);
    padding:5px 8px;border-radius:4px;margin:7px 0;line-height:1.45}
  .ct{padding:5px 0;border-top:1px solid #f0ece2}
  .ct .cn{font-size:12px;font-weight:600}
  .ct .ln{display:flex;flex-wrap:wrap;gap:3px 12px;margin-top:2px}
  .ct a{font-size:11.5px;color:var(--wine);text-decoration:none}
  .ct a.tel{color:var(--ink)}.ct a:hover{text-decoration:underline}
  .ct .ico{opacity:.55;margin-right:3px}
  .contacts{margin-top:6px}
  .toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:460;
    background:#fbf6ec;border:1px solid var(--ochre);color:#7a5a1c;font-size:12px;
    padding:7px 13px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.12);display:none}
  @media(max-width:820px){
    main{flex-direction:column}
    aside{width:100%;max-height:200px;border-right:none;border-bottom:1px solid var(--line)}
    .mapwrap{height:55vh;min-height:360px}.stats{gap:15px}
  }
</style>
</head>

": ["Basilicata"], "mandato": "NO", "fatturato": "", "info": "Appena partito", "contatti": [{"nome": "Franco Antonio", "tel": "347/3655429", "email": "antponio65.franco@gmail.com", "pec": "antoniofrancoag2024@pec.it"}], "fatturatoNum": null, "stato": "presidiare", "lat": 40.642, "lng": 15.805}, {"cod": "", "agenzia": "Giuly srl", "cityprov": "Campobasso", "regioniRaw": "Molise", "regioni": ["Molise"], "mandato": "NO", "fatturato": "", "info": "Appena partito", "contatti": [{"nome": "Nicola Lalli", "tel": "", "email": "", "pec": ""}], "fatturatoNum": null, "stato": "presidiare", "lat": 41.563, "lng": 14.656}, {"cod": "", "agenzia": "Sante Convertini", "cityprov": "Brindisi Taranto e provincia", "regioniRaw": "Puglia", "regioni": ["Puglia"], "mandato": "NO", "fatturato": "", "info": "Da far partire subito maggio 26", "contatti": [{"nome": "Sante Convertini", "tel": "", "email": "", "pec": ""}], "fatturatoNum": null, "stato": "presidiare", "lat": 40.464, "lng": 17.247}, {"cod": "", "agenzia": "Palladino Antonio", "cityprov": "Foggia e provincia", "regioniRaw": "Puglia", "regioni": ["Puglia"], "mandato": "NO", "fatturato": "", "info": "Va sentito appena partito", "contatti": [{"nome": "Palladino Antonio", "tel": "328/4648355", "email": "agenziapalladino@gmail.com", "pec": "agenziapalladino@pec.it"}], "fatturatoNum": null, "stato": "presidiare", "lat": 41.462, "lng": 15.544}, {"cod": "", "agenzia": "VACANT", "cityprov": "Udine e friuli", "regioniRaw": "Friuli", "regioni": ["Friuli-Venezia Giulia"], "mandato": "", "fatturato": "", "info": "VACANT DA CERCARE", "contatti": [], "fatturatoNum": null, "stato": "vacante", "lat": 46.063, "lng": 13.235}];
const eur=n=>n==null?'—':'\u20ac'+(n>=1000?(n/1000).toLocaleString('it-IT',{maximumFractionDigits:1})+'k':n);
const norm=s=>(s||'').toLowerCase().split('/')[0].normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
const LAB={attivo:'Attivo',presidiare:'Da presidiare',vacante:'Vacante'};

// region aggregation
const byRegion={}; AGENTS.forEach(a=>a.regioni.forEach(r=>(byRegion[r]=byRegion[r]||[]).push(a)));
const regionFt=r=>(byRegion[r]||[]).reduce((s,a)=>s+(a.fatturatoNum||0),0);
function regStatus(r){const l=byRegion[r];if(!l||!l.length)return'scoperta';
  return l.some(a=>a.stato==='attivo')?'attiva':'presidiare';}
const REGSTYLE={
  attiva:{color:'#6e1423',fillColor:'#6e1423',fillOpacity:.18},
  presidiare:{color:'#b07d28',fillColor:'#c2872c',fillOpacity:.24},
  scoperta:{color:'#b9b3a6',fillColor:'#8d887d',fillOpacity:.16,dashArray:'4 3'}
};
// build normalized lookup of my region names
const MYREG={}; Object.keys(byRegion).forEach(r=>MYREG[norm(r)]=r);

// stats
(function(){
  const ft=AGENTS.reduce((s,a)=>s+(a.fatturatoNum||0),0);
  const seg=AGENTS.filter(a=>a.stato!=='attivo').length;
  document.getElementById('stats').innerHTML=[
    ['Agenti',AGENTS.length],['Regioni',Object.keys(byRegion).length+'/20'],
    ['Fatturato \u201925',eur(ft)],['Da seguire',seg]
  ].map(([l,v])=>`<div class="stat"><b>${v}</b><span>${l}</span></div>`).join('');
})();

// map + tiles
const map=L.map('map',{zoomControl:true,scrollWheelZoom:true}).setView([42.2,12.5],6);
const carto=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19,attribution:'&copy; OpenStreetMap, &copy; CARTO'}).addTo(map);
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19,attribution:'Tiles &copy; Esri'});
const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'});
const baseLayers={'Cartina':carto,'Satellite':sat,'Stradale (OSM)':osm};

// popups & pins
function popHtml(a){
  let c='';
  if(a.contatti&&a.contatti.length){
    c='<div class="contacts">'+a.contatti.map(ct=>{
      const tel=ct.tel?`<a class="tel" href="tel:${ct.tel.replace(/[^\d+]/g,'')}"><span class="ico">\u260e</span>${ct.tel}</a>`:'';
      const em=(ct.email||'').split(/[;\s]+/).filter(e=>e.includes('@'))
        .map(e=>`<a href="mailto:${e}"><span class="ico">\u2709</span>${e}</a>`).join('');
      if(!ct.nome&&!tel&&!em)return'';
      return `<div class="ct"><div class="cn">${ct.nome||'—'}</div><div class="ln">${tel}${em}</div></div>`;
    }).join('')+'</div>';
  }
  return `<div class="pop"><div class="ag">${a.agenzia}</div>
    <div class="zone">${a.cityprov||''}${a.cod?' · cod. '+a.cod:''}</div>
    <span class="pill ${a.stato}">${LAB[a.stato]}</span>
    <div class="ft">Fatturato 2025 · <b>${eur(a.fatturatoNum)}</b>${a.fatturato&&a.fatturatoNum==null?' ('+a.fatturato+')':''} · Mandato <b>${a.mandato||'—'}</b></div>
    ${a.info?`<div class="note">${a.info.trim()}</div>`:''}${c}</div>`;
}
const icon=st=>L.divIcon({className:'',html:`<div class="pin ${st}"><div class="b"></div></div>`,
  iconSize:[22,22],iconAnchor:[11,21],popupAnchor:[0,-20]});

// region layer (added below tiles, below markers)
const regionPane=map.createPane('regions'); regionPane.style.zIndex=350;
const labelPane=map.createPane('labels'); labelPane.style.zIndex=360; labelPane.style.pointerEvents='none';

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',6000);}

const GEO=[
 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/topojson/limits_IT_regions.topo.json',
 'https://cdn.jsdelivr.net/gh/openpolis/geojson-italy@master/topojson/limits_IT_regions.topo.json',
 'https://cdn.statically.io/gh/openpolis/geojson-italy/master/topojson/limits_IT_regions.topo.json'
];
async function getGeo(){for(const u of GEO){try{const r=await fetch(u);if(r.ok)return await r.json();}catch(e){}}return null;}

let regionLayer=null;
getGeo().then(topo=>{
  if(!topo){toast('Confini non caricati (rete bloccata): mostro solo i puntatori.');addMarkers();return;}
  const obj=topo.objects[Object.keys(topo.objects)[0]];
  const fc=topojson.feature(topo,obj);
  regionLayer=L.geoJSON(fc,{pane:'regions',
    style:f=>{const my=MYREG[norm(f.properties.reg_name)];const st=my?regStatus(my):'scoperta';
      return Object.assign({weight:1.4},REGSTYLE[st]);},
    onEachFeature:(f,layer)=>{
      const name=f.properties.reg_name, my=MYREG[norm(name)];
      const list=my?byRegion[my]:[];
      layer.on('mouseover',()=>layer.setStyle({weight:2.6,fillOpacity:Math.min(.5,(layer.options.fillOpacity||.2)+.15)}));
      layer.on('mouseout',()=>regionLayer.resetStyle(layer));
      layer.bindTooltip(`<b>${name}</b><br>${list.length?list.length+' agenti · '+eur(regionFt(my)):'Zona scoperta'}`,{sticky:true});
      // label at center
      const c=layer.getBounds().getCenter();
      L.marker(c,{pane:'labels',interactive:false,icon:L.divIcon({className:'',
        html:`<div class="reglabel">${name.split('/')[0]}</div>`,iconSize:[110,16],iconAnchor:[55,8]})}).addTo(map);
    }
  }).addTo(map);
  addMarkers();
}).catch(()=>{toast('Confini non caricati: mostro solo i puntatori.');addMarkers();});

const markers={};
function addMarkers(){
  AGENTS.forEach((a,i)=>{
    const m=L.marker([a.lat,a.lng],{icon:icon(a.stato),riseOnHover:true,zIndexOffset:1000})
      .addTo(map).bindPopup(popHtml(a),{maxWidth:300});
    m.bindTooltip(a.agenzia,{direction:'top',offset:[0,-18]});
    markers[i]=m;
  });
  L.control.layers(baseLayers,regionLayer?{'Confini regioni':regionLayer}:null,{position:'topright'}).addTo(map);
}

// sidebar
const agentlist=document.getElementById('agentlist');
function render(filter){
  const f=norm(filter),groups={};
  AGENTS.forEach((a,i)=>{
    const hay=norm(a.agenzia+' '+a.cityprov+' '+a.regioniRaw+' '+(a.contatti||[]).map(c=>c.nome).join(' '));
    if(f&&!hay.includes(f))return;
    a.regioni.forEach(r=>(groups[r]=groups[r]||[]).push(i));
  });
  const order=Object.keys(groups).sort((a,b)=>regionFt(b)-regionFt(a));
  agentlist.innerHTML=order.length?order.map(r=>{
    const items=groups[r].sort((x,y)=>(AGENTS[y].fatturatoNum||0)-(AGENTS[x].fatturatoNum||0));
    return `<div class="reghead">${r}<em>${eur(regionFt(r))}</em></div>`+items.map(i=>{
      const a=AGENTS[i];
      return `<div class="agent" data-i="${i}"><span class="dot ${a.stato}"></span>
        <span class="nm">${a.agenzia}</span><span class="ft">${eur(a.fatturatoNum)}</span></div>`;
    }).join('');
  }).join(''):'<div style="text-align:center;color:var(--ink-soft);margin-top:24px;font-size:13px">Nessun risultato.</div>';
  agentlist.querySelectorAll('.agent').forEach(el=>{
    el.addEventListener('click',()=>{
      agentlist.querySelectorAll('.agent').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      const i=+el.dataset.i,a=AGENTS[i];
      map.flyTo([a.lat,a.lng],8,{duration:.6});
      setTimeout(()=>markers[i]&&markers[i].openPopup(),650);
    });
  });
}
document.getElementById('q').addEventListener('input',e=>render(e.target.value));
render('');
setTimeout(()=>map.invalidateSize(),200);
</script>
</body>
