<style>
  :root{
    --paper:#f4f1ea;--paper2:#ece7db;--ink:#22252b;--ink-soft:#5c5e63;
    --wine:#6e1423;--wine-deep:#4a0d18;--ochre:#c2872c;--grey:#8d887d;--line:#ddd7c9;
    --vh:100vh;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;min-height:480px}
  header{padding:11px 16px 10px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;justify-content:space-between;gap:12px;
    background:linear-gradient(180deg,#f7f4ee,#f1ede4);z-index:700}
  .brand h1{font-family:'Fraunces',Georgia,serif;font-weight:500;font-size:20px;margin:0;color:var(--wine-deep);line-height:1.1}
  .brand .sub{font-size:11px;color:var(--ink-soft);margin-top:2px}
  .stats{display:flex;gap:20px}
  .stat{text-align:right}
  .stat b{font-family:'Fraunces',serif;font-size:19px;font-weight:600;display:block;line-height:1}
  .stat span{font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-soft)}
  .menubtn{display:none;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;
    color:var(--wine-deep);font-family:inherit;font-size:13px;font-weight:600;
    padding:9px 13px;border-radius:9px;cursor:pointer}
  .menubtn svg{width:16px;height:16px}
  main{flex:1;display:flex;min-height:0;position:relative}
  aside{width:300px;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#f7f4ee;z-index:650}
  .asidehead{display:none}
  .search{padding:12px 14px 10px;border-bottom:1px solid var(--line)}
  .search input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;
    font-size:15px;background:#fff;color:var(--ink);outline:none;font-family:inherit}
  .search input:focus{border-color:var(--wine);box-shadow:0 0 0 3px rgba(110,20,35,.10)}
  .listscroll{overflow-y:auto;flex:1;padding:6px 8px 24px;-webkit-overflow-scrolling:touch}
  .reghead{font-family:'Fraunces',serif;font-size:13px;color:var(--wine-deep);font-weight:600;
    padding:8px 8px 4px;display:flex;justify-content:space-between;border-bottom:1px solid var(--line);margin:6px 0 2px}
  .reghead em{font-style:normal;font-size:10px;color:var(--ink-soft);font-weight:500}
  .agent{padding:10px 9px;border-radius:8px;cursor:pointer;font-size:13.5px;display:flex;align-items:center;gap:9px}
  .agent:active,.agent.active{background:var(--paper2)}
  .agent .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .agent .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .agent .ft{font-size:11.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  .dot.attivo{background:var(--wine)}.dot.presidiare{background:var(--ochre)}.dot.vacante{background:var(--grey)}
  .mapwrap{flex:1;position:relative;min-width:0}
  #map{position:absolute;inset:0;background:#a9d6f2}
  .backdrop{display:none;position:absolute;inset:0;background:rgba(34,37,43,.4);z-index:640}
  .legend{position:absolute;left:10px;bottom:18px;z-index:450;background:rgba(247,244,238,.94);
    border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:10.5px;max-width:46vw}
  .legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
  .legend i{width:10px;height:10px;border-radius:50%;display:inline-block;flex:none}
  .legend .sec{margin-top:5px;padding-top:5px;border-top:1px solid var(--line)}
  .legend .sq{width:12px;height:10px;border-radius:3px;display:inline-block;flex:none}
  .pin{position:relative;width:24px;height:24px}
  .pin .b{position:absolute;inset:0;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
    border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.35)}
  .pin.attivo .b{background:var(--wine)}.pin.presidiare .b{background:var(--ochre)}.pin.vacante .b{background:var(--grey)}
  .reglabel{font-family:'Fraunces',serif;font-size:11px;font-weight:600;color:#2a2620;
    text-shadow:0 0 3px #fff,0 0 3px #fff,0 0 6px #fff;white-space:nowrap;pointer-events:none;text-align:center}
  .leaflet-popup-content-wrapper{border-radius:12px;padding:2px}
  .leaflet-popup-content{margin:12px 14px;font-family:'Inter',sans-serif;width:250px!important}
  .pop .ag{font-family:'Fraunces',serif;font-weight:600;font-size:16px;color:var(--wine-deep);line-height:1.2}
  .pop .zone{font-size:11.5px;color:var(--ink-soft);margin-top:2px}
  .pill{display:inline-block;font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;
    padding:2px 7px;border-radius:20px;font-weight:600;margin-top:6px}
  .pill.attivo{background:rgba(110,20,35,.10);color:var(--wine)}
  .pill.presidiare{background:rgba(194,135,44,.18);color:#9a6916}
  .pill.vacante{background:#ece9e0;color:#6b675c}
  .pop .ft{font-size:11.5px;color:var(--ink-soft);margin-top:7px}
  .pop .ft b{color:var(--ink);font-variant-numeric:tabular-nums}
  .pop .note{font-size:11px;color:#6a5d4e;background:#faf7f0;border-left:3px solid var(--ochre);
    padding:5px 8px;border-radius:4px;margin:7px 0;line-height:1.45}
  .ct{padding:6px 0;border-top:1px solid #f0ece2}
  .ct .cn{font-size:12.5px;font-weight:600}
  .ct .ln{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:3px}
  .ct a{font-size:12.5px;color:var(--wine);text-decoration:none;padding:2px 0}
  .ct a.tel{color:var(--ink)}.ct a:active{text-decoration:underline}
  .ct .ico{opacity:.55;margin-right:3px}
  .contacts{margin-top:6px}
  .toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);z-index:660;
    background:#fbf6ec;border:1px solid var(--ochre);color:#7a5a1c;font-size:12px;
    padding:8px 14px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.12);display:none;max-width:90vw;text-align:center}
  /* MOBILE */
  @media(max-width:820px){
    header{flex-wrap:nowrap}
    .brand h1{font-size:17px}.brand .sub{display:none}
    .stats{display:none}
    .menubtn{display:inline-flex}
    aside{position:absolute;top:0;bottom:0;left:0;width:86%;max-width:340px;
      transform:translateX(-102%);transition:transform .26s ease;box-shadow:6px 0 24px rgba(0,0,0,.18)}
    aside.open{transform:translateX(0)}
    .asidehead{display:flex;align-items:center;justify-content:space-between;
      padding:12px 14px;border-bottom:1px solid var(--line)}
    .asidehead b{font-family:'Fraunces',serif;color:var(--wine-deep);font-size:16px}
    .asidehead .x{border:none;background:none;font-size:22px;color:var(--ink-soft);cursor:pointer;line-height:1;padding:0 4px}
    aside.open ~ .backdrop{display:block}
    .legend{font-size:10px;left:8px;bottom:14px;padding:7px 9px}
  }
  @media(max-width:380px){.legend .sec{display:none}}
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:12px">
      <button class="menubtn" id="menubtn" aria-label="Elenco agenti">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        Elenco
      </button>
      <div class="brand">
        <h1>Mappa Agenti · Italia 2026</h1>
        <div class="sub">Mosnel — regioni per copertura, puntatori per agente</div>
      </div>
    </div>
    <div class="stats" id="stats"></div>
  </header>
  <main>
    <aside id="aside">
      <div class="asidehead"><b>Agenti</b><button class="x" id="closeaside" aria-label="Chiudi">&times;</button></div>
      <div class="search"><input id="q" type="text" placeholder="Cerca agente, zona, regione…" autocomplete="off"></div>
      <div class="listscroll" id="agentlist"></div>
    </aside>
    <div class="mapwrap">
      <div id="map"></div>
      <div class="toast" id="toast"></div>
      <div class="legend">
        <div class="row"><i style="background:var(--wine)"></i> Agente attivo</div>
        <div class="row"><i style="background:var(--ochre)"></i> Da presidiare</div>
        <div class="row"><i style="background:var(--grey)"></i> Zona vacante</div>
        <div class="sec">
          <div class="row"><span class="sq" style="background:rgba(110,20,35,.30)"></span> Regione presidiata</div>
          <div class="row"><span class="sq" style="background:rgba(194,135,44,.34)"></span> Da presidiare</div>
          <div class="row"><span class="sq" style="background:rgba(141,136,125,.28)"></span> Scoperta</div>
        </div>
      </div>
    </div>
    <div class="backdrop" id="backdrop"></div>
  </main>

const eur=n=>n==null?'—':'\u20ac'+(n>=1000?(n/1000).toLocaleString('it-IT',{maximumFractionDigits:1})+'k':n);
const norm=s=>(s||'').toLowerCase().split('/')[0].normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z]/g,'');
const LAB={attivo:'Attivo',presidiare:'Da presidiare',vacante:'Vacante'};

const byRegion={}; AGENTS.forEach(a=>a.regioni.forEach(r=>(byRegion[r]=byRegion[r]||[]).push(a)));
const regionFt=r=>(byRegion[r]||[]).reduce((s,a)=>s+(a.fatturatoNum||0),0);
function regStatus(r){const l=byRegion[r];if(!l||!l.length)return'scoperta';
  return l.some(a=>a.stato==='attivo')?'attiva':'presidiare';}
const REGSTYLE={
  attiva:{color:'#6e1423',fillColor:'#6e1423',fillOpacity:.18},
  presidiare:{color:'#b07d28',fillColor:'#c2872c',fillOpacity:.24},
  scoperta:{color:'#b9b3a6',fillColor:'#8d887d',fillOpacity:.16,dashArray:'4 3'}
};
const MYREG={}; Object.keys(byRegion).forEach(r=>MYREG[norm(r)]=r);

(function(){
  const ft=AGENTS.reduce((s,a)=>s+(a.fatturatoNum||0),0);
  const seg=AGENTS.filter(a=>a.stato!=='attivo').length;
  document.getElementById('stats').innerHTML=[
    ['Agenti',AGENTS.length],['Regioni',Object.keys(byRegion).length+'/20'],
    ['Fatturato \u201925',eur(ft)],['Da seguire',seg]
  ].map(([l,v])=>`<div class="stat"><b>${v}</b><span>${l}</span></div>`).join('');
})();

const map=L.map('map',{zoomControl:true,scrollWheelZoom:true,tap:true}).setView([42.2,12.5],5);
const carto=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19,attribution:'&copy; OpenStreetMap, &copy; CARTO'}).addTo(map);
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:19,attribution:'Tiles &copy; Esri'});
const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'});
const baseLayers={'Cartina':carto,'Satellite':sat,'Stradale (OSM)':osm};

function popHtml(a){
  let c='';
  if(a.contatti&&a.contatti.length){
    c='<div class="contacts">'+a.contatti.map(ct=>{
      const tel=ct.tel?`<a class="tel" href="tel:${ct.tel.replace(/[^\d+]/g,'')}"><span class="ico">\u260e</span>${ct.tel}</a>`:'';
      const em=(ct.email||'').split(/[;\s]+/).filter(e=>e.includes('@'))
        .map(e=>`<a href="mailto:${e}"><span class="ico">\u2709</span>${e}</a>`).join('');
      if(!ct.nome&&!tel&&!em)return'';
      return `<div class="ct"><div class="cn">${ct.nome||'—'}</div><div class="ln">${tel}${em}</div></div>`;
    }).join('')+'</div>';
  }
  return `<div class="pop"><div class="ag">${a.agenzia}</div>
    <div class="zone">${a.cityprov||''}${a.cod?' · cod. '+a.cod:''}</div>
    <span class="pill ${a.stato}">${LAB[a.stato]}</span>
    <div class="ft">Fatturato 2025 · <b>${eur(a.fatturatoNum)}</b>${a.fatturato&&a.fatturatoNum==null?' ('+a.fatturato+')':''} · Mandato <b>${a.mandato||'—'}</b></div>
    ${a.info?`<div class="note">${a.info.trim()}</div>`:''}${c}</div>`;
}
const icon=st=>L.divIcon({className:'',html:`<div class="pin ${st}"><div class="b"></div></div>`,
  iconSize:[24,24],iconAnchor:[12,23],popupAnchor:[0,-21]});

map.createPane('regions').style.zIndex=350;
const lp=map.createPane('labels'); lp.style.zIndex=360; lp.style.pointerEvents='none';
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',6500);}

const GEO=[
 'https://raw.githubusercontent.com/openpolis/geojson-italy/master/topojson/limits_IT_regions.topo.json',
 'https://cdn.jsdelivr.net/gh/openpolis/geojson-italy@master/topojson/limits_IT_regions.topo.json',
 'https://cdn.statically.io/gh/openpolis/geojson-italy/master/topojson/limits_IT_regions.topo.json'
];
async function getGeo(){for(const u of GEO){try{const r=await fetch(u);if(r.ok)return await r.json();}catch(e){}}return null;}

let regionLayer=null;
getGeo().then(topo=>{
  if(topo){
    const obj=topo.objects[Object.keys(topo.objects)[0]];
    regionLayer=L.geoJSON(topojson.feature(topo,obj),{pane:'regions',
      style:f=>{const my=MYREG[norm(f.properties.reg_name)];const st=my?regStatus(my):'scoperta';
        return Object.assign({weight:1.4},REGSTYLE[st]);},
      onEachFeature:(f,layer)=>{
        const name=f.properties.reg_name,my=MYREG[norm(name)],list=my?byRegion[my]:[];
        layer.on('mouseover',()=>layer.setStyle({weight:2.6,fillOpacity:Math.min(.5,(layer.options.fillOpacity||.2)+.15)}));
        layer.on('mouseout',()=>regionLayer.resetStyle(layer));
        layer.bindTooltip(`<b>${name}</b><br>${list.length?list.length+' agenti · '+eur(regionFt(my)):'Zona scoperta'}`,{sticky:true});
        const c=layer.getBounds().getCenter();
        L.marker(c,{pane:'labels',interactive:false,icon:L.divIcon({className:'',
          html:`<div class="reglabel">${name.split('/')[0]}</div>`,iconSize:[110,16],iconAnchor:[55,8]})}).addTo(map);
      }}).addTo(map);
  } else toast('Confini non caricati (rete bloccata): solo puntatori.');
  addMarkers();
}).catch(()=>{toast('Confini non caricati: solo puntatori.');addMarkers();});

const markers={};
function addMarkers(){
  AGENTS.forEach((a,i)=>{
    const m=L.marker([a.lat,a.lng],{icon:icon(a.stato),riseOnHover:true,zIndexOffset:1000})
      .addTo(map).bindPopup(popHtml(a),{maxWidth:290});
    m.bindTooltip(a.agenzia,{direction:'top',offset:[0,-20]});
    markers[i]=m;
  });
  L.control.layers(baseLayers,regionLayer?{'Confini regioni':regionLayer}:null,{position:'topright'}).addTo(map);
}

const agentlist=document.getElementById('agentlist');
function render(filter){
  const f=norm(filter),groups={};
  AGENTS.forEach((a,i)=>{
    const hay=norm(a.agenzia+' '+a.cityprov+' '+a.regioniRaw+' '+(a.contatti||[]).map(c=>c.nome).join(' '));
    if(f&&!hay.includes(f))return;
    a.regioni.forEach(r=>(groups[r]=groups[r]||[]).push(i));
  });
  const order=Object.keys(groups).sort((a,b)=>regionFt(b)-regionFt(a));
  agentlist.innerHTML=order.length?order.map(r=>{
    const items=groups[r].sort((x,y)=>(AGENTS[y].fatturatoNum||0)-(AGENTS[x].fatturatoNum||0));
    return `<div class="reghead">${r}<em>${eur(regionFt(r))}</em></div>`+items.map(i=>{
      const a=AGENTS[i];
      return `<div class="agent" data-i="${i}"><span class="dot ${a.stato}"></span>
        <span class="nm">${a.agenzia}</span><span class="ft">${eur(a.fatturatoNum)}</span></div>`;
    }).join('');
  }).join(''):'<div style="text-align:center;color:var(--ink-soft);margin-top:24px;font-size:13px">Nessun risultato.</div>';
  agentlist.querySelectorAll('.agent').forEach(el=>{
    el.addEventListener('click',()=>{
      agentlist.querySelectorAll('.agent').forEach(e=>e.classList.remove('active'));
      el.classList.add('active');
      const i=+el.dataset.i,a=AGENTS[i];
      openAside(false);
      map.flyTo([a.lat,a.lng],8,{duration:.6});
      setTimeout(()=>markers[i]&&markers[i].openPopup(),700);
    });
  });
}
document.getElementById('q').addEventListener('input',e=>render(e.target.value));
render('');

// keep map sized correctly on mobile (rotation, address-bar resize)
function fix(){setTimeout(()=>map.invalidateSize(),150);}
window.addEventListener('resize',fix);
window.addEventListener('orientationchange',fix);
fix();
</script>
</body>
</html>
